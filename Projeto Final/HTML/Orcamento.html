<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orcamento</title>
</head>
<body>
    <h1>Orçamento</h1>
    
    <form>
        <div>
            <label for="orcamentoid">ID Orçamento:</label>
            <input type="number" id="orcamentoid" required>
        </div>

        <div>
            <label for="orcamentoitemid">ID Item Orçamento:</label>
            <input type="number" id="orcamentoitemid" required>
        </div>

        <div>
            <label for="produtoid">ID Produto:</label>
            <input type="number" id="produtoid" required>
        </div>

        <div>
            <label for="produtodesc">Descrição do Produto:</label>
            <input type="text" id="produtodesc" required>
        </div>

        <div>
            <label for="qt_produto">Quantidade:</label>
            <input type="number" id="qt_produto" required>
        </div>

        <div>
            <label for="vl_unitario">Valor Unitário:</label>
            <input type="number" id="vl_unitario" step="0.01" required>
        </div>

        <div>
            <label for="vl_total">Valor Total:</label>
            <input type="number" id="vl_total" step="0.01" required>
        </div>

        <button onclick="orcamento()" type="submit">Enviar Orçamento</button>
    </form>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src= "../JavaScript/orcamento.js"></script>
</body>
</html>
