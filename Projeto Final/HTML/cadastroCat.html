<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Categoria</title>
    <link rel="stylesheet" href="../CSS/cadastroCat.css">
</head>
<body>
        <form>
            <label>Código da Categoria</label>
            <input type="number" id="CodInput" placeholder="Digite o código do produto" required>
    <label>Descrição da Categoria</label>
     <select id="CategoriaInput" required>
        <option value="">Selecione</option>
        <option value="Informática">Informática</option>
        <option value="Escritório">Escritório</option>
        <option value="Alimentos">Alimentos</option>
        <option value="Serviços">Serviços</option>
        <option value="Manutenção">Manutenção</option>
     </select>
      <button onclick="SalvarCategoria(event)" type="submit">Salvar</button>
      <button type="reset">Limpar</button>
         <div id="mensagem">
     </div>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../JavaScript/cadatroCat.js"></script>
</body>
</html>
