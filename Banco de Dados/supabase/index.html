<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Define a codificação da página.
       UTF-8 permite usar acentos normalmente. -->
  <meta charset="UTF-8">

  <!-- Faz a tela se adaptar melhor em celular, tablet e computador. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título que aparece na aba do navegador. -->
  <title>Cadastro de Cliente</title>

  <style>
    /* Estilo geral da página */
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      padding: 30px;
    }

    /* Caixa principal onde fica todo o conteúdo */
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 8px;
    }

    /* Espaçamento dos títulos */
    h1, h2 {
      margin-bottom: 15px;
    }

    /* Formulário organizado em duas colunas */
    .form-cliente {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 15px;
    }

    /* Cada campo fica em formato vertical:
       label em cima e input embaixo */
    .campo {
      display: flex;
      flex-direction: column;
    }

    .campo label {
      margin-bottom: 5px;
      font-weight: bold;
    }

    .campo input,
    .campo select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    /* O campo nome ocupa as duas colunas do formulário */
    .campo.nome {
      grid-column: span 2;
    }

    /* Área onde ficam os botões do formulário */
    .acoes {
      grid-column: span 2;
      text-align: right;
    }

    /* Estilo base dos botões */
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    /* Botão salvar/atualizar */
    .btn-salvar {
      background: #007bff;
      color: white;
    }

    /* Botão limpar */
    .btn-limpar {
      background: #ddd;
    }

    /* Botão editar que aparece dentro da tabela */
    .btn-editar {
      background: #ffc107;
      color: #333;
      padding: 6px 10px;
      margin-right: 5px;
    }

    /* Botão excluir que aparece dentro da tabela */
    .btn-excluir {
      background: #dc3545;
      color: white;
      padding: 6px 10px;
    }

    /* Botão cancelar edição.
       Começa escondido e só aparece quando o usuário clica em editar. */
    .btn-cancelar-edicao {
      background: #6c757d;
      color: white;
      display: none;
    }

    /* Área de mensagem de sucesso ou erro */
    .mensagem {
      font-weight: bold;
      margin-bottom: 15px;
    }

    .sucesso {
      color: green;
    }

    .erro {
      color: red;
    }

    /* Estilo da tabela */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #007bff;
      color: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: left;
    }

    /* Ajuste para telas pequenas */
    @media (max-width: 700px) {
      .form-cliente {
        grid-template-columns: 1fr;
      }

      .campo.nome,
      .acoes {
        grid-column: span 1;
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>

  <!-- Conteúdo principal da página -->
  <main class="container">

    <!-- Título da tela -->
    <h1>Cadastro de Cliente</h1>

    <!-- Formulário usado tanto para cadastrar quanto para editar -->
    <form id="formCliente" class="form-cliente">

      <!-- Campo CLIENTEID.
           No banco ele é SERIAL, então é gerado automaticamente.
           Por isso o campo fica readonly. -->
      <div class="campo">
        <label for="clienteId">Código</label>
        <input
          type="number"
          id="clienteId"
          placeholder="Gerado automaticamente"
          readonly
        >
      </div>

      <!-- Campo TIPO_CLIENTE.
           Na tabela é CHAR(1), então salvamos apenas uma letra:
           F para Pessoa Física
           J para Pessoa Jurídica -->
      <div class="campo">
        <label for="tipoCliente">Tipo de Cliente</label>
        <select id="tipoCliente" required>
          <option value="">Selecione</option>
          <option value="F">Pessoa Física</option>
          <option value="J">Pessoa Jurídica</option>
        </select>
      </div>

      <!-- Campo CPF_CNPJ_CLIENTE.
           Na tabela é VARCHAR(18), então usamos maxlength="18". -->
      <div class="campo">
        <label for="cpfCnpjCliente">CPF / CNPJ</label>
        <input
          type="text"
          id="cpfCnpjCliente"
          maxlength="18"
          placeholder="Digite o CPF ou CNPJ"
          required
        >
      </div>

      <!-- Campo NOME_CLIENTE.
           Na tabela é VARCHAR(100), então usamos maxlength="100". -->
      <div class="campo nome">
        <label for="nomeCliente">Nome do Cliente</label>
        <input
          type="text"
          id="nomeCliente"
          maxlength="100"
          placeholder="Digite o nome do cliente"
          required
        >
      </div>

      <!-- Botões do formulário -->
      <div class="acoes">

        <!-- Limpa os campos do formulário -->
        <button type="reset" class="btn-limpar">
          Limpar
        </button>

        <!-- Cancela a edição e volta para o modo cadastro.
             Esse botão começa escondido. -->
        <button
          type="button"
          id="btnCancelarEdicao"
          class="btn-cancelar-edicao"
        >
          Cancelar edição
        </button>

        <!-- Botão principal.
             Quando estiver cadastrando, aparece como "Salvar".
             Quando estiver editando, o JavaScript muda para "Atualizar". -->
        <button type="submit" id="btnSalvar" class="btn-salvar">
          Salvar
        </button>
      </div>
    </form>

    <!-- Aqui aparecerão mensagens como:
         "Cliente salvo com sucesso"
         "Erro ao salvar cliente"
         "Cliente excluído com sucesso" -->
    <p id="mensagem" class="mensagem"></p>

    <!-- Título da listagem -->
    <h2>Clientes Cadastrados</h2>

    <!-- Tabela onde os clientes serão exibidos -->
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Tipo</th>
          <th>CPF / CNPJ</th>
          <th>Nome</th>
          <th>Ações</th>
        </tr>
      </thead>

      <!-- O tbody começa com uma mensagem.
           Depois o JavaScript substitui esse conteúdo pelos dados do Supabase. -->
      <tbody id="tabelaClientes">
        <tr>
          <td colspan="5">Carregando clientes...</td>
        </tr>
      </tbody>
    </table>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="cadastro.js"></script>

</body>
</html>
